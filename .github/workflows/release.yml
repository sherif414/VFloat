name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - auto
      dry_run:
        description: "Dry run (test release without publishing)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Package
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[ci skip]') &&
       !contains(github.event.head_commit.message, 'chore: release'))

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Run type checking
        run: vp exec vue-tsc --build tsconfig.build.json

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp pack

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect release type
        id: detect-release
        if: github.event_name == 'push' || github.event.inputs.release_type == 'auto'
        shell: bash
        run: |
          set -euo pipefail

          range_args=()
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "$last_tag" ]]; then
            range_args+=("${last_tag}..HEAD")
          fi

          if git log --format=%B "${range_args[@]}" | grep -q "BREAKING CHANGE"; then
            release_type="major"
          elif git log --format=%s "${range_args[@]}" | grep -Eq "^[a-z]+(\(.+\))?!: "; then
            release_type="major"
          elif git log --format=%s "${range_args[@]}" | grep -Eq "^feat(\(.+\))?: "; then
            release_type="minor"
          elif git log --format=%s "${range_args[@]}" | grep -Eq "^(fix|perf)(\(.+\))?: "; then
            release_type="patch"
          else
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable changes found."
            exit 0
          fi

          echo "has_release=true" >> "$GITHUB_OUTPUT"
          echo "release_type=${release_type}" >> "$GITHUB_OUTPUT"
          echo "Detected release type: ${release_type}"

      - name: Release
        if: github.event_name == 'workflow_dispatch' || steps.detect-release.outputs.has_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_type="${{ github.event.inputs.release_type }}"
            dry_run="${{ github.event.inputs.dry_run }}"

            if [[ "$release_type" == "auto" ]]; then
              release_type="${{ steps.detect-release.outputs.release_type }}"
            fi
          else
            release_type="${{ steps.detect-release.outputs.release_type }}"
            dry_run="false"
          fi

          if [[ -z "$release_type" ]]; then
            echo "No releasable changes found, skipping release."
            exit 0
          fi

          release_args=("$release_type" "--ci")
          if [[ "$dry_run" == "true" ]]; then
            release_args+=("--dry-run")
          fi

          vp exec release-it "${release_args[@]}"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            CHANGELOG.md
          retention-days: 30

  notify-failure:
    name: Notify Release Failure
    runs-on: ubuntu-latest
    needs: release
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Release workflow failed for ${context.sha.substring(0, 7)}`;
            const body = `The release workflow failed for commit ${context.sha}.

            **Workflow run:** ${context.payload.repository.html_url}/actions/runs/${context.runId}
            **Commit:** ${context.payload.repository.html_url}/commit/${context.sha}

            Please investigate and fix the issue.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci/cd'],
            });
